name: FieldSeal validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: fieldseal-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-validation:
    name: App validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Check Python syntax
        run: >-
          python -m py_compile
          app.py
          queue_midnight_demo.py
          seed_demo_team.py
          seed_midnight_showcase.py
          visual_preview.py
          workflow_smoke.py

      - name: Check browser JavaScript syntax
        run: |
          node --check static/app.js
          node --check static/i18n.js
          node --check static/midnight-demo.en.js
          node --check static/midnight-demo.locales.js
          node --check static/sw.js
          node --check static/tooltips.js

      - name: Run complete workflow smoke test
        run: python workflow_smoke.py
